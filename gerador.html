<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Dayse Borges</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --marrom-profundo: #442d1c;
            --laranja-pastel: #e8d1a7;
            --verde-oliva: #676127;
            --branco: #ffffff;
        }

        body {
            background-color: var(--laranja-pastel);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 800px; }

        .card {
            background-color: var(--branco);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            text-align: center;
        }

        h2 { color: var(--marrom-profundo); text-transform: uppercase; font-size: 1.1rem; margin-bottom: 20px; }

        .form-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }

        input, select {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--laranja-pastel);
            font-family: 'Montserrat';
            outline: none;
        }

        .btn-gerar {
            width: 100%;
            padding: 15px;
            background-color: var(--verde-oliva);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 0 #3e441c;
            transition: all 0.1s;
        }

        .btn-gerar:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #3e441c;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: var(--marrom-profundo); color: var(--laranja-pastel); padding: 12px; font-size: 0.7rem; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.85rem; color: var(--marrom-profundo); text-align: center; }

        #feedback { display: none; margin-top: 15px; padding: 10px; background: #f0f4f1; border-radius: 8px; color: var(--verde-oliva); font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Painel Dayse Borges</h2>
        <div class="form-grid">
            <input type="text" id="nomeInput" placeholder="Paciente">
            <input type="date" id="dataInput">
            <select id="horaInput">
                <script>
                    for(let h=9; h<=20; h++) {
                        let hh = h < 10 ? '0'+h : h;
                        document.write(`<option value="${hh}:00">${hh}:00</option>`);
                        if(h < 20) document.write(`<option value="${hh}:30">${hh}:30</option>`);
                    }
                </script>
            </select>
        </div>
        <button class="btn-gerar" onclick="gerar()">GERAR E COPIAR LINK</button>
        <div id="feedback">Link gerado para teste local!</div>
    </div>

    <div class="card">
        <h2>CONTROLE DE ATENDIMENTOS</h2>
        <table>
            <thead>
                <tr>
                    <th>PACIENTE</th>
                    <th>DATA</th>
                    <th>HORÁRIO</th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo"></tbody>
        </table>
    </div>
</div>

<script>
    let lista = JSON.parse(localStorage.getItem('atendimentosDayse')) || [];

    function render() {
        const corpo = document.getElementById('tabelaCorpo');
        corpo.innerHTML = lista.map(i => `<tr><td>${i.n}</td><td>${i.d}</td><td>${i.h}h</td></tr>`).join('');
    }

    function gerar() {
        const n = document.getElementById('nomeInput').value.trim();
        const d = document.getElementById('dataInput').value;
        const h = document.getElementById('horaInput').value;

        if(!n || !d) {
            alert("Por favor, preencha o nome e a data.");
            return;
        }

        const dataF = d.split('-').reverse().join('/');
        
        // AQUI ESTÁ A MUDANÇA: Agora o link busca o arquivo na sua pasta local
        const link = `index.html?nome=${encodeURIComponent(n)}&data=${d}T${h}`;

        lista.unshift({ n, d: dataF, h });
        localStorage.setItem('atendimentosDayse', JSON.stringify(lista));
        render();

        // Copia o link e permite que você clique para testar
        navigator.clipboard.writeText(link);
        document.getElementById('feedback').innerHTML = `Link copiado! <a href="${link}" target="_blank" style="color: var(--verde-oliva); font-weight: bold;">Clique aqui para testar</a>`;
        document.getElementById('feedback').style.display = 'block';
        
        document.getElementById('nomeInput').value = '';
    }
    render();
</script>
</body>
</html>
